services:
  module-ttt:
    image: talkingdb/ttt
    pull_policy: always
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - tdb-spool:/var/tmp/tdb-spool
    labels:
      - traefik.enable=true
      - traefik.http.routers.${TTT_BACKEND_HOST}.rule=Host(`${TTT_BACKEND_HOST}`)
      - traefik.http.routers.${TTT_BACKEND_HOST}.entrypoints=websecure
      - traefik.http.routers.${TTT_BACKEND_HOST}.tls.certresolver=le
      - traefik.http.services.${TTT_BACKEND_HOST}.loadbalancer.server.port=8090
    networks:
      - docker

volumes:
  tdb-spool:

networks:
  docker:
    external: true
    name: docker
