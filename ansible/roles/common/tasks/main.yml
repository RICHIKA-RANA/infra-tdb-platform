---
# VM base configuration: packages, service user, deploy dirs, talkingdb-net.

- name: Install base packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  tags: [common, packages]

- name: Ensure service group exists
  ansible.builtin.group:
    name: "{{ service_group }}"
    state: present
    system: true
  become: true
  tags: [common, user]

- name: Ensure service user exists
  ansible.builtin.user:
    name: "{{ service_user }}"
    group: "{{ service_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present
  become: true
  tags: [common, user]

- name: Ensure deploy directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ service_user }}"
    group: "{{ service_group }}"
    mode: "0750"
  loop: "{{ common_deploy_dirs }}"
  become: true
  tags: [common, dirs]

# Create talkingdb-net only if Docker is present; deferred otherwise.
- name: Probe for a running Docker daemon
  ansible.builtin.command: docker info
  register: common_docker_info
  changed_when: false
  failed_when: false
  check_mode: false
  become: true
  tags: [common, network]

- name: Create the talkingdb Docker network
  community.docker.docker_network:
    name: "{{ docker_network_name }}"
    driver: "{{ common_docker_network_driver }}"
    state: present
  become: true
  when: common_docker_info.rc == 0
  tags: [common, network]

- name: Notice — Docker not yet present, talkingdb-net deferred
  ansible.builtin.debug:
    msg: >-
      Docker is not available on {{ inventory_hostname }} yet, so the
      '{{ docker_network_name }}' network was not created. It will be created
      once the docker_host role has run (re-run site.yml after docker_host).
  when: common_docker_info.rc != 0
  tags: [common, network]
